name: Bug report
description: Report a reproducible defect
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: Summary
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: input
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    attributes:
      label: Minimal reproduction
      description: Include exact build and run commands.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Operating system, compiler, standard library, XMake version, and dependency versions.
    validations:
      required: true
