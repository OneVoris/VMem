name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XMake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Validate repository
        run: python tools/check_repository.py

      - name: Configure Debug
        run: xmake f -m debug --build_tests=y

      - name: Build Debug
        run: xmake

      - name: Test Debug
        run: xmake test

      - name: Configure Release
        run: xmake f -m release --build_tests=y

      - name: Build Release
        run: xmake

      - name: Test Release
        run: xmake test
